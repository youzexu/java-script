<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始vue</title>
    <script type="text/javascript" src="../js/vue.js"></script>
</head>

<body>

    <div id="root">
        <h1>插值语法</h1>
        <h3>你好{{name}}</h3>
        <hr />
        <h1>指令语法</h1>
        <a :href="school.url" :x="hello">点我去{{school.name}}学习1</a>
        <a V-bind:href="school.url" x="hello">点我去{{school.name}}学习2</a>
    </div>


</body>

<script type="text/javascript">
    Vue.config.productionTip = false;
    new Vue({
        el: '#root',
        data: {
            name: 'jack',
            school: {
                url: "http://www.atguigu.com",
                hello: '你好',
                name: '尚硅谷'
            }
        }
    })
</script>

</html>
