<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始vue</title>
    <script type="text/javascript" src="../js/vue.js"></script>
</head>

<body>
    <div id="root">
        <h1>欢迎来到{{name}}学习</h1>
        <a href="http://www.atguigu.com" @click="goWebsite">点我前往{{name}}官网</a>
    </div>

    <script type="text/javascript">
        Vue.config.productionTip = false;

        const vm = new Vue({
            el: '#root',
            data: {
                name: '尚硅谷',
            },
            methods: {
                goWebsite(e) {
                    alert('同学你好')
                }
            }
        })

    </script>
</body>
