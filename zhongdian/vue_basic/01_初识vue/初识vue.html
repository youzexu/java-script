<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始vue</title>
    <script type="text/javascript" src="../js/vue.js"></script>
</head>

<body>
    <div id="root">
        <h1>hello,{{name}},{{age}}</h1>
    </div>

    <script type="text/javascript">
        Vue.config.productionTip = false;

        const x = new Vue({
            el: '#root',
            data: {
                name: '尚硅谷',
                age: '12'
            }
        })

    </script>
</body>

</html>
