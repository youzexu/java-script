<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始vue</title>
    <script type="text/javascript" src="../js/vue.js"></script>
</head>

<body>
    <div id="root">

        <button @click="student.age++">年龄加一岁</button><br>
        <button @click="addSex"> 添加性别属性，默认值：男</button><br>
        <button @click="student.sex='未知'">修改性别</button><br>
        <button @click="addFriend">在列表首位添加一个朋友</button><br>
        <button @click="updateFriendName">修改第一个名字为张三</button><br>
        <button @click="addHobby">添加一个爱好</button><br>
        <button @click="drive">修改第一个爱好为开车</button><br>

        <h3>姓名：{{student.name}}</h3>
        <h3>年龄：{{student.age}}</h3>
        <h3 v-if="student.sex">性别：{{student.sex}}</h3>
        <h3>爱好：</h3>
        <ul>
            <li v-for="(h,index) in student.hobby" :key="index">
                {{h}}
            </li>
        </ul>

        <h3>朋友们：</h3>
        <ul>
            <li v-for="(f,i) in student.frients" :key="i">
                {{f.name}}-{{f.age}}
            </li>
        </ul>

    </div>
</body>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
        el: '#root',
        data: {
            student: {
                name: 'tom',
                age: 18,
                hobby: ['看书', '唱歌', '烫头'],
                friends: [
                    { name: 'jerry', age: 35 },
                    { name: 'lucy', age: 36 },
                ]
            }
        },
        methods: {
            addSex() {
                this.$set(this.student, 'sex', '男')
            },
            addFriend() {
                this.student.frients.unshift({ name: 'jack', age: 30 })
            },
            updateFrendName() {
                this.student.friends[0].name = '张三'
            },
            addHobby() {
                this.student.hobby.push('学习')
            }
        },
    })

</script>

</html>`
